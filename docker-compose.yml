services:
  traefik:
    image: traefik:v3.6.8
    container_name: sima_traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:?set in .env}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt

  postgres:
    image: postgres:16-alpine
    container_name: sima_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sima_dance}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sima_dance}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sima_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET_KEY: ${DJANGO_SECRET_KEY:?set in .env}
      DEBUG: ${DJANGO_DEBUG:-False}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/${POSTGRES_DB:-sima_dance}
      ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-backend,localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-}
      CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
    command: >-
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             uvicorn app.asgi:application --host 0.0.0.0 --port 8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.sima-api.rule=Host(`${TRAEFIK_API_HOST:-api.sima.local}`)
      - traefik.http.routers.sima-api.entrypoints=websecure
      - traefik.http.routers.sima-api.tls=true
      - traefik.http.routers.sima-api.tls.certresolver=letsencrypt
      - traefik.http.services.sima-api.loadbalancer.server.port=8000
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.sima-api-http.rule=Host(`${TRAEFIK_API_HOST:-api.sima.local}`)
      - traefik.http.routers.sima-api-http.entrypoints=web
      - traefik.http.routers.sima-api-http.middlewares=redirect-to-https

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sima_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NUXT_BACKEND_URL: http://backend:8000
      BACKEND_URL: http://backend:8000
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    labels:
      - traefik.enable=true
      - traefik.http.routers.sima-web.rule=Host(`${TRAEFIK_WEB_HOST:-sima.local}`)
      - traefik.http.routers.sima-web.entrypoints=websecure
      - traefik.http.routers.sima-web.tls=true
      - traefik.http.routers.sima-web.tls.certresolver=letsencrypt
      - traefik.http.services.sima-web.loadbalancer.server.port=3000
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.sima-web-http.rule=Host(`${TRAEFIK_WEB_HOST:-sima.local}`)
      - traefik.http.routers.sima-web-http.entrypoints=web
      - traefik.http.routers.sima-web-http.middlewares=redirect-to-https

volumes:
  postgres_data:
  traefik_letsencrypt:
